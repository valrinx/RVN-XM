services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    env_file:
      - .env.example
    ports:
      - '3000:3000'
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:4000

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env.example
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    env_file:
      - .env.example
    depends_on:
      - api
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      API_BASE_URL: http://api:4000

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tradexm
      POSTGRES_PASSWORD: tradexm
      POSTGRES_DB: tradexm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
